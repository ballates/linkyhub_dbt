sources:
  - name: linky_bucket_landing
    database: prime-force-478609-s4
    schema: linky_bucket_landing
    description: "Tables chargées via Fivetran depuis GCS (linki_bucket) vers BigQuery"
    tables:
      - name: invitations
        description: "Table source des invitations LinkedIn issue de Fivetran (GCS → BigQuery)"
        columns:
          - name: from
            description: "Nom complet de l'expéditeur de l'invitation"
          - name: to
            description: "Nom complet du destinataire de l'invitation"
          - name: sent_at
            description: "Date et heure d'envoi de l'invitation"
          - name: direction
            description: "Sens de l'invitation : OUTGOING (envoyée) ou INCOMING (reçue)"
          - name: inviter_profile_url
            description: "URL du profil LinkedIn de la personne qui a envoyé l'invitation"
          - name: invitee_profile_url
            description: "URL du profil LinkedIn de la personne qui a reçu l'invitation"

      - name: certifications
        description: "Table source des certifications LinkedIn issue de Fivetran (GCS → BigQuery)"
        columns:
          - name: name
            description: "Nom de la certification obtenue"
          - name: url
            description: "Lien vers la certification en ligne"
          - name: authority
            description: "Organisme ou entreprise qui a délivré la certification"
          - name: started_on
            description: "Date de début de la certification"
          - name: finished_on
            description: "Date d'expiration de la certification"
          - name: license_number
            description: "Numéro de licence ou identifiant unique de la certification"

      - name: connections
        description: "Table source des connexions LinkedIn issue de Fivetran (GCS → BigQuery)"
        columns:
          - name: first_name
            description: "Prénom du contact LinkedIn"
          - name: last_name
            description: "Nom de famille du contact LinkedIn"
          - name: url
            description: "Lien vers le profil LinkedIn du contact"
          - name: email_address
            description: "Adresse email du contact"
          - name: company
            description: "Entreprise actuelle du contact"
          - name: position
            description: "Poste occupé par le contact"
          - name: connected_on
            description: "Date à laquelle la connexion a été établie"

      - name: learning
        description: "Table source des formations LinkedIn Learning issue de Fivetran (GCS → BigQuery)"
        columns:
          - name: content_title
            description: "Titre du contenu de formation LinkedIn Learning"
          - name: content_description
            description: "Description détaillée du contenu de formation"
          - name: content_type
            description: "Type de contenu : Course, Video, etc."
          - name: content_last_watched_date_if_viewed_
            description: "Date de dernière consultation du contenu"
          - name: content_completed_at_if_completed_
            description: "Date à laquelle le contenu a été complété"
          - name: content_saved
            description: "Indique si le contenu a été sauvegardé"
          - name: notes_taken_on_videos_if_taken_
            description: "Notes prises sur le contenu"

      - name: comments
        description: "Table source des commentaires LinkedIn issue de Fivetran (GCS → BigQuery)"
        columns:
          - name: date
            description: "Date du commentaire"
          - name: link
            description: "Lien vers le post commenté"
          - name: message
            description: "Contenu du commentaire"

      - name: reactions
        description: "Table source des réactions LinkedIn issue de Fivetran (GCS → BigQuery)"
        columns:
          - name: date
            description: "Date de la réaction"
          - name: type
            description: "Type de réaction (Like, Celebrate, Support, etc.)"
          - name: link
            description: "Lien vers le post ayant reçu la réaction"
  - name: google_drive
    database: prime-force-478609-s4
    schema: google_drive
    tables:
