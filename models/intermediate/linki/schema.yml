version: 2

models:
  - name: int_invitations
    description: "Table intermédiaire des invitations LinkedIn avec normalisation des types"
    columns:
      - name: id_invitation
        description: "Clé surrogate de l'invitation (generate_surrogate_key expéditeur+destinataire+date)"
        tests:
          - not_null
          - unique
      - name: sender
        description: "Nom complet de l'expéditeur de l'invitation"
        tests:
          - not_null
      - name: recipient
        description: "Nom complet du destinataire de l'invitation"
      - name: sent_at
        description: "Date et heure d'envoi de l'invitation"
      - name: direction
        description: "Sens de l'invitation : OUTGOING (envoyée) ou INCOMING (reçue)"
        tests:
          - accepted_values:
              values: ['OUTGOING', 'INCOMING']
      - name: inviter_profile_url
        description: "URL du profil LinkedIn de la personne qui a envoyé l'invitation"
      - name: invitee_profile_url
        description: "URL du profil LinkedIn de la personne qui a reçu l'invitation"
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_certifications
    description: "Table intermédiaire des certifications LinkedIn avec normalisation des types"
    columns:
      - name: id_certification
        description: "Clé surrogate de la certification (generate_surrogate_key nom+organisme+numéro)"
        tests:
          - not_null
          - unique
      - name: name
        description: "Nom de la certification obtenue"
        tests:
          - not_null
      - name: url
        description: "Lien vers la certification en ligne"
      - name: authority
        description: "Organisme ou entreprise qui a délivré la certification"
      - name: started_on
        description: "Date de début de la certification (TIMESTAMP)"
      - name: finished_on
        description: "Date d'expiration de la certification (TIMESTAMP)"
      - name: license_number
        description: "Numéro de licence ou identifiant unique de la certification"
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_learning
    description: "Table intermédiaire des formations LinkedIn Learning avec normalisation des types"
    columns:
      - name: id_learning
        description: "Clé surrogate de la formation (generate_surrogate_key du titre)"
        tests:
          - not_null
          - unique
      - name: title
        description: "Titre du contenu de formation LinkedIn Learning"
        tests:
          - not_null
      - name: description
        description: "Description détaillée du contenu de formation"
      - name: type
        description: "Type de contenu : Course, Video, etc."
      - name: last_watched_date
        description: "Date de dernière consultation du contenu (TIMESTAMP)"
      - name: completed_at
        description: "Date à laquelle le contenu a été complété (TIMESTAMP, peut être NULL)"
      - name: saved
        description: "Indique si le contenu a été sauvegardé"
      - name: notes
        description: "Notes prises sur le contenu"
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_connections
    description: "Table intermédiaire des connexions LinkedIn avec normalisation des types"
    columns:
      - name: id_connection
        description: "Clé surrogate de la connexion (generate_surrogate_key nom+prénom+URL+email)"
        tests:
          - not_null
          - unique
      - name: first_name
        description: "Prénom du contact LinkedIn"
      - name: last_name
        description: "Nom de famille du contact LinkedIn"
      - name: url
        description: "Lien vers le profil LinkedIn du contact"
      - name: email_address
        description: "Adresse email du contact (normalisée en minuscules)"
      - name: company
        description: "Entreprise actuelle du contact"
      - name: position
        description: "Poste occupé par le contact"
      - name: connected_on
        description: "Date à laquelle la connexion a été établie (DATE)"
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_abonnes
    description: "Table intermédiaire des abonnés LinkedIn avec normalisation des types"
    columns:
      - name: id_abonne
        description: "Clé surrogate de l'abonné (generate_surrogate_key sur la date)"
        tests:
          - not_null
          - unique
      - name: date
        description: "Date de référence de la métrique (clé naturelle)"
        tests:
          - not_null
          - unique
      - name: nouveaux_abonnes
        description: "Nombre de nouveaux abonnés sur la période"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10000
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_donnees_geo
    description: "Table intermédiaire des données géographiques LinkedIn avec normalisation des types"
    columns:
      - name: zones_geographiques
        description: "Catégorie démographique (ex: Lieux, Secteurs, Niveau hiérarchique)"
        tests:
          - not_null
      - name: id_value
        description: "Clé surrogate de la valeur (generate_surrogate_key catégorie+valeur) — inclut la catégorie pour éviter les collisions inter-catégories"
        tests:
          - not_null
          - unique
      - name: pourcentage
        description: "Pourcentage de l'audience correspondant à la catégorie"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
      - name: valeur
        description: "Libellé associé à la catégorie démographique"
        tests:
          - not_null
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_engagement
    description: "Table intermédiaire unifiée des commentaires et réactions LinkedIn - grain : 1 ligne par événement d'engagement"
    columns:
      - name: id_engagement
        description: "Clé surrogate de l'événement (id_comment ou id_reaction selon type_event)"
        tests:
          - not_null
          - unique
      - name: post_id
        description: "Clé étrangère vers dim_posts"
        tests:
          - not_null
      - name: type_event
        description: "Type d'événement : 'comment' ou 'reaction'"
        tests:
          - not_null
          - accepted_values:
              values: ['comment', 'reaction']
      - name: date
        description: "Date de l'événement d'engagement"
        tests:
          - not_null
      - name: link
        description: "URL du post concerné"
        tests:
          - not_null
      - name: content
        description: "Contenu de l'engagement : message du commentaire ou type de réaction (Like, Celebrate, etc.)"
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_interactions
    description: "Table intermédiaire des interactions sur les posts LinkedIn avec normalisation des types"
    columns:
      - name: id_post
        description: "Clé surrogate du post (generate_surrogate_key sur l'id LinkedIn)"
        tests:
          - not_null
          - unique
      - name: title_post
        description: "Titre du post extrait depuis le slug de l'URL (nouveau format LinkedIn)"
      - name: url_post
        description: "URL du post LinkedIn"
        tests:
          - not_null
      - name: date_publication_post
        description: "Date de publication du post (DATE)"
        tests:
          - not_null
      - name: interactions
        description: "Nombre total d'interactions (likes, commentaires, partages)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000000
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null

  - name: int_posts
    description: "Table intermédiaire des posts LinkedIn avec normalisation des types"
    columns:
      - name: id_post
        description: "Clé surrogate du post (generate_surrogate_key sur l'id LinkedIn)"
        tests:
          - not_null
          - unique
      - name: title_post
        description: "Titre du post extrait depuis le slug de l'URL (nouveau format LinkedIn)"
      - name: impressions
        description: "Nombre de fois que le post a été affiché dans un fil d'actualité"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000000
      - name: url_post
        description: "URL du post LinkedIn"
        tests:
          - not_null
          - unique
      - name: date_publication_post
        description: "Date de publication du post (DATE)"
        tests:
          - not_null
      - name: _at_load
        description: "Date de chargement de la ligne"
        tests:
          - not_null
