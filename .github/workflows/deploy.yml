name: dbt Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dbt-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dbt-bigquery
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python "dbt-bigquery>=1.11.0"
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp_key.json

      - name: dbt deps
        run: dbt deps --profiles-dir .
        env:
          DBT_KEYFILE: /tmp/gcp_key.json

      - name: dbt build (prod)
        run: dbt build --profiles-dir . --target prod
        env:
          DBT_KEYFILE: /tmp/gcp_key.json

      - name: dbt docs generate
        run: dbt docs generate --profiles-dir . --target prod --select "path:models"
        env:
          DBT_KEYFILE: /tmp/gcp_key.json

      - name: Filtrer les packages externes du manifest
        run: |
          python3 << 'EOF'
          import json

          with open("target/manifest.json") as f:
              manifest = json.load(f)

          for key in ["nodes", "sources", "macros", "exposures", "metrics"]:
              if key in manifest:
                  manifest[key] = {
                      k: v for k, v in manifest[key].items()
                      if v.get("package_name") == "linkyhub_dbt"
                  }

          with open("target/manifest.json", "w") as f:
              json.dump(manifest, f)

          print("Packages externes supprimés du manifest")
          EOF

      - name: Préparer les docs pour GitHub Pages
        run: |
          mkdir -p /tmp/docs
          cp target/index.html /tmp/docs/
          cp target/manifest.json /tmp/docs/
          cp target/catalog.json /tmp/docs/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/docs

  deploy-docs:
    runs-on: ubuntu-latest
    needs: dbt-deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
