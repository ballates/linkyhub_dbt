name: Auto-merge PR

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Attendre que dbt-ci soit enregistré
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs \
              --jq '.check_runs[] | select(.name == "dbt-ci") | .status' 2>/dev/null)
            if [ -n "$STATUS" ]; then
              echo "dbt-ci détecté avec statut : $STATUS"
              break
            fi
            echo "Attente... ($i/12)"
            sleep 10
          done

      - name: Activer l'auto-merge
        run: gh pr merge --auto --squash --repo "${{ github.repository }}" "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
