name: dbt CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dbt-bigquery
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python "dbt-bigquery>=1.11.0"
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp_key.json

      - name: dbt deps
        run: dbt deps --profiles-dir .
        env:
          DBT_KEYFILE: /tmp/gcp_key.json

      - name: dbt compile
        run: dbt compile --profiles-dir . --target dev
        env:
          DBT_KEYFILE: /tmp/gcp_key.json

      - name: dbt build + test (dev)
        run: dbt build --profiles-dir . --target dev
        env:
          DBT_KEYFILE: /tmp/gcp_key.json

      - name: Auto-merge PR si tests passent
        if: success()
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
